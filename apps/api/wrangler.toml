name = "sudoku-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Serves the built SPA from the same origin as the API — eliminates the
# cross-origin routing mismatch that caused "failed to authenticate" in prod.
[assets]
directory = "../web/dist"
binding = "ASSETS"

[vars]
# JWT_SECRET must be set via `wrangler secret put JWT_SECRET` before first deploy.
# For local dev, put it in apps/api/.dev.vars (gitignored).
ALLOWED_ORIGIN = "*"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RoomDO"]

[[d1_databases]]
binding = "DB"
database_name = "sudoku"
database_id = "4d53a0fe-9bd3-4c3d-9a20-cd9556f7e537"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "PUZZLES"
id = "df0fb5a11b9a4bcab7317e26087af2e2"