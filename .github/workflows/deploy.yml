name: Deploy to Cloudflare

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build:web
        env:
          # Set this GitHub Actions secret to your Worker URL (e.g. https://sudoku-api.<account>.workers.dev)
          # so API calls bypass the Pages host and go directly to the Worker.
          # Once you point your custom domain at the Worker and delete the Pages project,
          # you can remove this and leave VITE_API_BASE_URL unset (same-origin via Workers Assets).
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'apps/api'
          command: d1 migrations apply sudoku --remote

      - name: Deploy Worker (API + Web Assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'apps/api'
          command: deploy